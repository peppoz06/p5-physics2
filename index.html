<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Tilt & Shake — 3D Physics Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui">
    <h1>Tilt & Shake</h1>
    <p id="hint">Tilt or shake your phone to move the balls</p>
    <div class="controls">
      <button id="motionBtn">Enable motion controls</button>
      <div id="status">Motion: <span id="motionState">off</span></div>
    </div>
    <div id="credits">Demo — mobile-first 3D physics</div>
  </div>

  <canvas id="c"></canvas>

  <div id="errOverlay" aria-hidden="true">
    <div id="errBox">
      <h2>Loading error</h2>
      <p id="errMsg">If you see this, the demo failed to start. Open the browser console for details.</p>
      <p>Try serving the folder over HTTP (see README) — some browsers block module imports from local files.</p>
    </div>
  </div>

  
  <!-- UMD builds to avoid module resolution issues on some hosts/browsers -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.156.0/build/three.min.js"></script>
  <!-- use original cannon UMD build for global CANNON to avoid ESM export syntax in cannon-es UMD usage -->
  <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
  <script>
    // load main.js as a classic script and show overlay on error
    function showError(err){
      console.error(err);
      const overlay = document.getElementById('errOverlay');
      const msg = document.getElementById('errMsg');
      if(msg) msg.textContent = String(err && (err.message || err) || 'Unknown error');
      if(overlay) overlay.style.display = 'flex';
    }
    const s = document.createElement('script');
    s.src = './main.js?t=' + Date.now();
    s.onload = () => console.log('main.js loaded (classic)');
    s.onerror = (e) => showError('Failed to load main.js');
    document.body.appendChild(s);
  </script>
</body>
</html>
