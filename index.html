<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Tilt & Shake — 3D Physics Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui">
    <h1>Tilt & Shake</h1>
    <p id="hint">Tilt or shake your phone to move the balls</p>
    <div class="controls">
      <button id="motionBtn">Enable motion controls</button>
      <div id="status">Motion: <span id="motionState">off</span></div>
    </div>
    <div id="credits">Demo — mobile-first 3D physics</div>
  </div>

  <canvas id="c"></canvas>

  <div id="errOverlay" aria-hidden="true">
    <div id="errBox">
      <h2>Loading error</h2>
      <p id="errMsg">If you see this, the demo failed to start. Open the browser console for details.</p>
      <p>Try serving the folder over HTTP (see README) — some browsers block module imports from local files.</p>
    </div>
  </div>

  <script type="module">
    // dynamic import so we can catch and show errors on-screen
    try{
      await import('./main.js');
    }catch(err){
      console.error('Failed to load main.js', err);
      const overlay = document.getElementById('errOverlay');
      const msg = document.getElementById('errMsg');
      if(msg) msg.textContent = String(err.message || err);
      if(overlay) overlay.style.display = 'flex';
    }
  </script>
</body>
</html>
